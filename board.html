<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>게시판 — 이해연</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./boardstyle.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="./index.html">이해연<span>.</span></a>
  <div class="nav-links">
    <a href="index.html#about">소개</a>
    <a href="index.html#skills">관심사</a>
    <a href="index.html#projects">프로젝트</a>
    <a href="board.html" class="active">게시판</a>
    <a href="./study.html">공부기록</a>
    <a href="index.html#contact">연락처</a>
  </div>
</nav>

<div class="wrap">
  <div id="list-view">
    <p class="page-label">Board</p>
    <h1 class="page-title">게시판</h1>
    <div class="board-top">
      <span class="board-count">총 <span id="post-count">0</span>개의 글이 있습니다.</span>
      <button class="btn-write" onclick="openWrite()">글 작성</button>
    </div>
    <table>
      <thead><tr><th class="td-num">번호</th><th>제목</th><th class="td-date">날짜</th></tr></thead>
      <tbody id="post-tbody"></tbody>
    </table>
    <div class="board-empty" id="board-empty">아직 작성된 글이 없습니다.</div>
  </div>

  <div id="post-view" class="post-view">
    <p class="page-label">Post View</p>
    <div class="post-view-title" id="view-title"></div>
    <div class="post-view-meta" id="view-meta"></div>
    <div class="post-view-body" id="view-body"></div>
    <div class="view-btns">
      <button class="btn-back" onclick="closePost()">← 목록으로</button>
      <button class="btn-edit" id="edit-btn" style="padding:.6rem 1.4rem; border:1px solid #e8ddd3; background:#c0622f; color:#fff; font-size:.78rem; cursor:pointer;">수정하기</button>
      <button class="btn-delete" id="delete-btn">삭제하기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="write-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeWrite()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; cursor:pointer;">✕</button>
    <div id="modal-title" style="font-family:'Gowun Batang'; font-size:1.4rem; margin-bottom:1.5rem;">글 작성</div>
    <input type="text" id="input-title" placeholder="제목을 입력하세요"/>
    <textarea id="input-body" placeholder="내용을 입력하세요" style="min-height:150px; resize:none;"></textarea>
    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button onclick="closeWrite()" class="btn-back">취소</button>
      <button onclick="submitPost()" class="btn-write">등록</button>
    </div>
  </div>
</div>

<script>
  let posts = [];
  let currentIdx = null; 
  let isEditMode = false; // 수정 모드 판별용 변수

  window.onload = function() {
    const saved = localStorage.getItem('my_posts');
    if (saved) {
      posts = JSON.parse(saved);
      renderList();
    }
  }

  function renderList() {
    const tbody = document.getElementById('post-tbody');
    const empty = document.getElementById('board-empty');
    document.getElementById('post-count').textContent = posts.length;
    
    if (posts.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    
    tbody.innerHTML = posts.slice().reverse().map((p, i) => {
      const actualIdx = posts.length - 1 - i;
      return `
      <tr onclick="viewPost(${actualIdx})">
        <td class="td-num">${actualIdx + 1}</td>
        <td>${p.title}</td>
        <td class="td-date">${p.date}</td>
      </tr>`
    }).join('');
  }

  // 새 글 작성창 열기
  function openWrite() { 
    isEditMode = false;
    document.getElementById('modal-title').textContent = "글 작성";
    document.getElementById('input-title').value = '';
    document.getElementById('input-body').value = '';
    document.getElementById('write-modal').classList.add('open'); 
  }

  // 수정창 열기 (기존 내용 불러오기)
  function openEdit(idx) {
    isEditMode = true;
    currentIdx = idx;
    const p = posts[idx];
    
    document.getElementById('modal-title').textContent = "글 수정";
    document.getElementById('input-title').value = p.title;
    document.getElementById('input-body').value = p.body;
    document.getElementById('write-modal').classList.add('open');
  }

  function closeWrite() { 
    document.getElementById('write-modal').classList.remove('open');
  }

  function submitPost() {
    const title = document.getElementById('input-title').value.trim();
    const body = document.getElementById('input-body').value.trim();
    if (!title || !body) { alert('제목과 내용을 모두 입력해주세요.'); return; }

    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    
    if (isEditMode) {
      // 수정 로직
      posts[currentIdx].title = title;
      posts[currentIdx].body = body;
      posts[currentIdx].date = dateStr + " (수정됨)";
    } else {
      // 신규 등록 로직
      posts.push({title, body, date: dateStr});
    }
    
    saveAndRender();
    closeWrite();
    
    if (isEditMode) {
      viewPost(currentIdx); // 수정 완료 후 바뀐 내용 바로 보여주기
    }
  }

  function viewPost(idx) {
    currentIdx = idx;
    const p = posts[idx];
    document.getElementById('view-title').textContent = p.title;
    document.getElementById('view-meta').textContent = p.date;
    document.getElementById('view-body').textContent = p.body;
    
    // 버튼 이벤트 연결
    document.getElementById('delete-btn').onclick = function() { deletePost(idx); };
    document.getElementById('edit-btn').onclick = function() { openEdit(idx); };

    document.getElementById('list-view').style.display = 'none';
    document.getElementById('post-view').classList.add('open');
  }

  function deletePost(idx) {
    if(confirm('정말 삭제하시겠습니까?')) {
      posts.splice(idx, 1);
      saveAndRender();
      closePost();
    }
  }

  function saveAndRender() {
    localStorage.setItem('my_posts', JSON.stringify(posts));
    renderList();
  }

  function closePost() {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('post-view').classList.remove('open');
  }
</script>
</body>
</html>
